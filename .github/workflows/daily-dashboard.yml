name: Daily V2 dashboard update

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 05:15 Asia/Riyadh. GitHub cron uses UTC.
    - cron: "15 2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data and build dashboards
        run: python update_github_pages_v2.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_data reports publish_dashboard
          if git diff --cached --quiet; then
            echo "No refreshed files to commit."
          else
            git commit -m "Daily dashboard refresh"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish_dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
